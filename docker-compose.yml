version: '3.8'

services:
  cpp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CPP_BACKEND_PORT=8080
      - PYTHON_ADK_URL=http://python-adk:5000
    volumes:
      - sqlite-data:/app/data
    depends_on:
      - python-adk

  python-adk:
    build:
      context: ./python_agent
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-pro}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - cpp-backend

volumes:
  sqlite-data:
